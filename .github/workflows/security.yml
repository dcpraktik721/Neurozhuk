name: Security Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  npm-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Production dependency audit
        run: npm audit --omit=dev
